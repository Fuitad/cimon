name: Security audit

# Nightly dependency vulnerability scan for both ecosystems: Rust crates (RustSec advisory DB
# via cargo-audit) and JS packages (GitHub advisory DB via npm audit). Runs on a schedule so a
# newly disclosed advisory against a pinned dependency surfaces even when no code has changed.
# Also runnable on demand, and whenever a lockfile changes (so a dependency bump is checked).
on:
  schedule:
    # 07:00 UTC every day.
    - cron: "0 7 * * *"
  workflow_dispatch:
  push:
    paths:
      - "src-tauri/Cargo.lock"
      - "package-lock.json"
      - ".github/workflows/security-audit.yml"

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: both audit jobs only check out the repo and scan its
# lockfiles against advisory databases. Nothing writes back, so contents:read suffices.
permissions:
  contents: read

jobs:
  cargo-audit:
    name: Rust crates (cargo-audit)
    runs-on: ubuntu-latest
    # Harden cargo's network layer against transient GitHub-runner HTTP failures, notably the
    # recurring "[16] Error in the HTTP2 framing layer" curl error during crates.io downloads.
    # Disabling HTTP/2 multiplexing avoids that framing error on the sparse-index and crate
    # tarball fetches; the higher retry count absorbs other transient blips.
    env:
      CARGO_NET_RETRY: "10"
      CARGO_HTTP_MULTIPLEXING: "false"
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      # cargo-audit reads Cargo.lock against the RustSec advisory DB; it does not build the app,
      # so the Tauri system libraries are not needed here.
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        working-directory: src-tauri
        run: cargo audit

  npm-audit:
    name: JS packages (npm audit)
    runs-on: ubuntu-latest
    # Retry transient npm registry fetch failures (npm's default is 2) so a flaky
    # registry.npmjs.org response doesn't fail the job on a network blip.
    env:
      npm_config_fetch_retries: "5"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Fail on high/critical advisories. Moderate/low (mostly transitive dev tooling) are noisy
      # for a gating job; raise the bar here and review the full report from the run logs.
      - name: npm audit
        run: npm audit --audit-level=high
