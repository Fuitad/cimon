name: Release

# Builds real, installable binaries for macOS (one universal Apple Silicon + Intel package),
# Windows (x64), and Linux (x64).
# Push a version tag (e.g. v0.1.0) to cut a draft GitHub Release with the installers attached.
# Or run manually (workflow_dispatch) to build the bundles and download them as run artifacts
# without creating a release.
#
# The macOS package is Developer ID signed and notarized when these repository secrets are set
# (Settings > Secrets and variables > Actions). Until then the macOS build falls back to an
# unsigned ad-hoc build, exactly as before, so the workflow is safe to run without them. See
# RELEASING.md for how to generate each value.
#   APPLE_CERTIFICATE           base64 of the Developer ID Application .p12 certificate
#   APPLE_CERTIFICATE_PASSWORD  password chosen when exporting that .p12
#   APPLE_SIGNING_IDENTITY      e.g. "Developer ID Application: Your Name (TEAMID)"
#   APPLE_API_ISSUER            App Store Connect API key Issuer ID (for notarization)
#   APPLE_API_KEY               App Store Connect API key ID (for notarization)
#   APPLE_API_KEY_BASE64        base64 of the AuthKey_<KEYID>.p8 private key file
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }} ${{ matrix.target || 'x64' }})
    # Cap the job so an intermittent Apple notary-service hang (notarytool --wait can stall for
    # hours) fails this leg instead of burning the 6-hour runner limit. The macOS leg notarizes
    # twice (the .app via tauri-action, then the .dmg below), so this leaves headroom for two
    # slow-but-healthy submissions; the fast Windows/Linux legs finish well under it.
    timeout-minutes: 75
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # One universal package (Apple Silicon + Intel)
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - platform: windows-latest # x64
            target: ""
            rust_targets: ""
            # Ship only the per-user NSIS -setup.exe (installMode currentUser, no admin).
            # Dropping the default WiX MSI avoids pairing a per-user installer with a
            # per-machine one. The "Assert Windows installer is NSIS-only" step below enforces it.
            args: "--bundles nsis"
          - platform: ubuntu-22.04 # x64 (.deb, .rpm, .AppImage)
            target: ""
            rust_targets: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    # Harden cargo's network layer against transient GitHub-runner HTTP failures, notably the
    # recurring "[16] Error in the HTTP2 framing layer" curl error during crates.io downloads.
    # Disabling HTTP/2 multiplexing avoids that framing error on the sparse-index and crate
    # tarball fetches; the higher retry count absorbs other transient blips. Applies to every
    # matrix leg, so the tauri-action build on macOS, Windows, and Linux all share it.
    env:
      CARGO_NET_RETRY: "10"
      CARGO_HTTP_MULTIPLEXING: "false"
      # Also retry transient npm registry fetch failures (npm's default is 2).
      npm_config_fetch_retries: "5"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS installs both arch targets so the universal build can lipo them together.
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get -o Acquire::Retries=3 update
          sudo apt-get -o Acquire::Retries=3 install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Assert updater signing secrets on tag releases
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        # windows-latest defaults run: steps to PowerShell, which cannot parse this bash; the
        # NSIS-only assert step below pins the bash shell for the same reason.
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${TAURI_SIGNING_PRIVATE_KEY}" ] || { echo "::error::TAURI_SIGNING_PRIVATE_KEY is required for signed updater artifacts"; exit 1; }
          [ -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" ] || { echo "::error::TAURI_SIGNING_PRIVATE_KEY_PASSWORD is required for signed updater artifacts"; exit 1; }

      - name: Prepare App Store Connect API key (macOS notarization)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          if [ -z "${APPLE_API_KEY_BASE64}" ]; then
            echo "APPLE_API_KEY_BASE64 not set; skipping notarization key setup (build will not be notarized)."
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/private_keys"
          key_path="$RUNNER_TEMP/private_keys/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Build app and bundle installers
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS Developer ID signing. Empty on Windows/Linux and until the secrets exist;
          # Tauri produces an unsigned ad-hoc macOS build when these are blank.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # macOS notarization via App Store Connect API key. APPLE_API_KEY_PATH is exported to
          # $GITHUB_ENV by the "Prepare App Store Connect API key" step above.
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          # Tauri updater signing. Required on tag releases by the preflight above.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # On a tag push: create/attach to a draft GitHub Release for that tag.
          # On manual runs: tagName is empty, so tauri-action only builds (no release).
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: CIMon ${{ github.ref_name }}
          releaseBody: See the assets below to download and install this version.
          releaseDraft: true
          prerelease: false
          # Each matrix leg would otherwise generate and upload its own single-platform latest.json
          # to the same draft release, racing the other legs (the "Not Found" asset-update error).
          # Disable it and let the finalize-updater-manifest job assemble the complete latest.json
          # from the uploaded .sig assets. The .sig files still upload (uploadUpdaterSignatures
          # defaults to true), and so do the updater artifacts they sign.
          includeUpdaterJson: false
          # Updater artifacts are signed, which requires TAURI_SIGNING_PRIVATE_KEY. Enable them only
          # on tag releases (the preflight above guarantees the key is present then); a manual
          # workflow_dispatch dry run leaves createUpdaterArtifacts at its tauri.conf.json default of
          # false so it still builds installers without any signing secret. The inline JSON is
          # single-quoted so tauri-action passes it to `tauri build --config` as one token.
          args: ${{ matrix.args }}${{ startsWith(github.ref, 'refs/tags/') && ' --config ''{"bundle":{"createUpdaterArtifacts":true}}''' || '' }}

      # Enforce the Windows install decision at build time, failing the leg (and so blocking
      # publication of the draft release, which is reviewed manually per RELEASING.md) if either
      # half is violated:
      #   per-user  -> bundle.windows.nsis.installMode must be currentUser (no admin, %LOCALAPPDATA%)
      #   NSIS-only -> exactly one or more NSIS -setup.exe and zero WiX MSI in the bundle output
      # The bundle is searched from src-tauri/target (always present post-build) with a path
      # filter, so an added target triple (target/<triple>/release/bundle) does not break it and
      # find never aborts the step before its ::error:: diagnostics run.
      - name: Assert Windows installer is per-user NSIS-only
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          mode=$(jq -r '.bundle.windows.nsis.installMode // ""' src-tauri/tauri.conf.json)
          [ "$mode" = "currentUser" ] || { echo "::error::NSIS installMode is '${mode:-unset}', expected currentUser (per-user, no admin)"; exit 1; }
          msi_count=$(find src-tauri/target -path '*/release/bundle/*' -name '*.msi' 2>/dev/null | wc -l | tr -d ' ')
          exe_count=$(find src-tauri/target -path '*/release/bundle/*' -name '*-setup.exe' 2>/dev/null | wc -l | tr -d ' ')
          echo "installMode=$mode  NSIS setup.exe=$exe_count  MSI=$msi_count"
          [ "$msi_count" -eq 0 ] || { echo "::error::Windows build produced $msi_count .msi file(s); expected NSIS only"; exit 1; }
          [ "$exe_count" -ge 1 ] || { echo "::error::No NSIS -setup.exe under src-tauri/target/**/release/bundle"; exit 1; }

      # tauri-action notarizes and staples the .app, but the .dmg wrapper it builds is only signed,
      # not notarized, so a downloaded .dmg would trip Gatekeeper once. Notarize + staple the .dmg
      # itself for a warning-free open. APPLE_API_KEY_PATH was exported to the env by the key-prep
      # step; if it is absent the build was unsigned, so this is a clean no-op.
      - name: Notarize and staple the macOS .dmg
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_API_KEY_PATH:-}" ]; then
            echo "APPLE_API_KEY_PATH not set; build was not notarized, nothing to staple."
            exit 0
          fi
          dmg=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg 2>/dev/null | head -1 || true)
          if [ -z "$dmg" ]; then
            echo "No .dmg found under the universal bundle dir; nothing to notarize."
            exit 0
          fi
          echo "Notarizing $dmg"
          xcrun notarytool submit "$dmg" \
            --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY" --issuer "$APPLE_API_ISSUER" \
            --wait --timeout 30m
          xcrun stapler staple "$dmg"
          xcrun stapler validate "$dmg"
          # On a tag push, tauri-action already uploaded the un-stapled .dmg to the draft release;
          # replace that asset with the stapled one. No-op on workflow_dispatch dry runs.
          if [ "${GITHUB_REF##refs/tags/}" != "$GITHUB_REF" ]; then
            echo "Replacing the release asset with the stapled .dmg"
            gh release upload "$GITHUB_REF_NAME" "$dmg" --clobber
          fi

      - name: Upload bundles as run artifacts (manual builds)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: cimon-${{ matrix.platform }}-${{ matrix.target || 'x64' }}
          path: |
            src-tauri/target/**/release/bundle/**/*
          if-no-files-found: error

  finalize-updater-manifest:
    name: Finalize updater manifest
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Assemble latest.json from release signatures
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          version="${tag#v}"
          download_base="${{ github.server_url }}/${{ github.repository }}/releases/download/${tag}"
          sigs=$(mktemp -d)
          frags=$(mktemp -d)

          # tauri-action uploaded one .sig per updater artifact to the draft release. The updater
          # keys are the macOS app bundle (*.app.tar.gz) and the Windows NSIS installer
          # (*-setup.exe); the .dmg and the Linux AppImage are not self-update targets. Reading the
          # real uploaded asset names here handles tauri-action's macOS rename
          # (CIMon.app.tar.gz -> CIMon_universal.app.tar.gz) without hardcoding it.
          gh release download "$tag" --dir "$sigs" --pattern '*.sig'

          build_fragment() {
            local target="$1" sig_glob="$2" out="$3" sig asset
            sig=$(find "$sigs" -name "$sig_glob" | head -1 || true)
            [ -n "$sig" ] || { echo "::error::No $sig_glob asset on release $tag"; exit 1; }
            asset=$(basename "${sig%.sig}")
            jq -n \
              --arg version "$version" \
              --arg target "$target" \
              --arg signature "$(cat "$sig")" \
              --arg url "$download_base/$asset" \
              '{version: $version, target: $target, signature: $signature, url: $url}' > "$out"
          }

          build_fragment "universal-apple-darwin" '*.app.tar.gz.sig' "$frags/macos.json"
          build_fragment "windows-x86_64" '*-setup.exe.sig' "$frags/windows.json"

          node scripts/assemble-tauri-updater-manifest.mjs latest.json "$frags/macos.json" "$frags/windows.json"
          node scripts/validate-release-workflow.mjs .github/workflows/release.yml
          jq -e '.platforms["darwin-aarch64"] and .platforms["darwin-x86_64"] and .platforms["windows-x86_64"]' latest.json >/dev/null

      - name: Upload latest.json to the draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release delete-asset "$GITHUB_REF_NAME" latest.json -y || true
          gh release upload "$GITHUB_REF_NAME" latest.json --clobber
