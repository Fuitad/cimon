name: Update Homebrew tap

# When a CIMon release is published, bump the cask in Fuitad/homebrew-tap to the new version and
# dmg checksum so `brew install --cask fuitad/tap/cimon` tracks the latest release.
#
# The default GITHUB_TOKEN cannot push to another repository, so this needs a HOMEBREW_TAP_TOKEN
# secret: a fine-grained personal access token with contents:write on Fuitad/homebrew-tap.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to sync (e.g. v0.1.0)
        required: true

# Least-privilege GITHUB_TOKEN: the dmg is fetched over anonymous HTTPS and the push to the
# tap repo uses HOMEBREW_TAP_TOKEN, so this workflow's own token only needs to read this repo.
permissions:
  contents: read

jobs:
  update-cask:
    # Run for stable releases and manual dispatch; skip prereleases.
    if: ${{ github.event_name != 'release' || !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag and version
        id: rel
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          if [ -z "$tag" ]; then echo "No tag to sync"; exit 1; fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Download the universal dmg and compute its sha256
        id: dmg
        run: |
          url="https://github.com/${{ github.repository }}/releases/download/${{ steps.rel.outputs.tag }}/CIMon_${{ steps.rel.outputs.version }}_universal.dmg"
          echo "Downloading $url"
          curl -fsSL -o cimon.dmg "$url"
          echo "sha256=$(sha256sum cimon.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Check out the tap
        uses: actions/checkout@v7
        with:
          repository: Fuitad/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update the cask
        run: |
          cask="tap/Casks/cimon.rb"
          sed -i -E "s/^  version \"[^\"]*\"/  version \"${{ steps.rel.outputs.version }}\"/" "$cask"
          sed -i -E "s/^  sha256 \"[^\"]*\"/  sha256 \"${{ steps.dmg.outputs.sha256 }}\"/" "$cask"
          echo "Updated cask:"
          cat "$cask"

      - name: Commit and push if changed
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Casks/cimon.rb; then
            echo "Cask already up to date; nothing to do."
            exit 0
          fi
          git add Casks/cimon.rb
          git commit -m "cimon ${{ steps.rel.outputs.version }}"
          git push
