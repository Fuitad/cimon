name: CI

# Every commit and every pull request must pass the full quality gate. This mirrors the
# local pre-commit hook (.githooks/pre-commit) so nothing that fails here passes there.
on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: every job only checks out and reads the repo to lint,
# typecheck, and test. Nothing writes back to the repo, so contents:read is all that's needed.
permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (eslint, prettier, tsc, knip, vitest)
    runs-on: ubuntu-latest
    # Retry transient npm registry fetch failures (npm's default is 2) so a flaky
    # registry.npmjs.org response doesn't fail the job on a network blip.
    env:
      npm_config_fetch_retries: "5"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier
        run: npm run format:check
      - name: TypeScript
        run: npm run typecheck
      - name: knip (dead code / unused exports & deps)
        run: npm run knip
      - name: Tests (vitest)
        run: npm run test:run

  rust:
    name: Rust (rustfmt, clippy, cargo-machete, tests)
    runs-on: ubuntu-22.04
    # Harden cargo's network layer against transient GitHub-runner HTTP failures, notably the
    # recurring "[16] Error in the HTTP2 framing layer" curl error during crates.io downloads.
    # Disabling HTTP/2 multiplexing avoids that framing error on the sparse-index and crate
    # tarball fetches; the higher retry count absorbs other transient blips.
    env:
      CARGO_NET_RETRY: "10"
      CARGO_HTTP_MULTIPLEXING: "false"
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v7
      - name: Install Tauri system dependencies
        working-directory: .
        run: |
          sudo apt-get -o Acquire::Retries=3 update
          sudo apt-get -o Acquire::Retries=3 install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: rustfmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Install cargo-machete
        working-directory: .
        run: cargo install cargo-machete --locked
      - name: cargo-machete (unused dependencies)
        run: cargo machete
      - name: tests
        run: cargo test
