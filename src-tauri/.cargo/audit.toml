# cargo-audit config -- see .github/workflows/security-audit.yml (runs `cargo audit` from this
# directory, so this is its project root per cargo-audit's config resolution).

[advisories]
# RUSTSEC-2026-0194 / RUSTSEC-2026-0195: quick-xml < 0.41.0 DoS (quadratic-time duplicate
# attribute check; unbounded namespace-declaration allocation). Both require quick-xml to parse
# attacker-controlled XML.
#
# The only quick-xml instance left in Cargo.lock after bumping tauri-winrt-notification to 0.7.3
# is pulled transitively via `tauri -> plist` (macOS-only), which Tauri's own `process.rs` uses
# solely to read the app's OWN Contents/Info.plist -- generated by this project's build and
# embedded in the same signed bundle -- when relaunching after a self-update. It never parses
# externally-sourced or attacker-influenced XML, so neither advisory is reachable here.
#
# No upstream fix exists yet: `plist` is at its latest release (1.9.0), which pins
# `quick-xml = "0.39.2"` (excludes the fixed 0.41.0). Ceiling: this ignore stays until `plist`
# (or Tauri, if it drops/replaces the dependency) ships a release resolving to quick-xml
# >=0.41.0 -- re-run `cargo update -p plist --dry-run` in src-tauri periodically; once it offers
# a bump, take it and remove this entry.
ignore = ["RUSTSEC-2026-0194", "RUSTSEC-2026-0195"]
