_version: 2

# Rust-core user-facing strings (notifications, native tray menu, status words).
# en is canonical; fr is shipped in v1. Accented letters in values are content, not
# decoration, and must be preserved. Interpolation uses %{var}.

"notify.pipeline_started":
  en: "%{project}: pipeline started"
  fr: "%{project} : pipeline démarré"
"notify.pipeline_succeeded":
  en: "%{project}: pipeline succeeded"
  fr: "%{project} : pipeline réussi"
"notify.pipeline_failed":
  en: "%{project}: pipeline failed"
  fr: "%{project} : pipeline échoué"
"notify.pipeline_canceled":
  en: "%{project}: pipeline canceled"
  fr: "%{project} : pipeline annulé"
# Job-level titles. "tâche" (job) is feminine in French, so the participle agrees:
# démarrée / réussie / échouée / annulée (vs the masculine pipeline forms above).
"notify.job_started":
  en: "%{project}: job %{job} started"
  fr: "%{project} : tâche %{job} démarrée"
"notify.job_succeeded":
  en: "%{project}: job %{job} succeeded"
  fr: "%{project} : tâche %{job} réussie"
"notify.job_failed":
  en: "%{project}: job %{job} failed"
  fr: "%{project} : tâche %{job} échouée"
"notify.job_canceled":
  en: "%{project}: job %{job} canceled"
  fr: "%{project} : tâche %{job} annulée"
"notify.body":
  en: "%{branch} (%{status})"
  fr: "%{branch} (%{status})"
# Label for the click action on a transition notification (the platforms that render notification
# buttons show it; clicking the notification body opens the same page). Keep it short.
"notify.open_action":
  en: "Open"
  fr: "Ouvrir"

# Token-health notifications (auth failure + upcoming expiry). These are operational alerts about
# the monitor itself and always fire, independent of the pipeline/job notification toggles.
"notify.auth_failed_title":
  en: "%{account}: token no longer valid"
  fr: "%{account} : jeton non valide"
"notify.auth_failed_body":
  en: "CIMon can no longer authenticate. Update the token in Settings."
  fr: "CIMon ne peut plus s'authentifier. Mettez à jour le jeton dans les paramètres."
"notify.expiry_title":
  en: "%{account}: token expiring soon"
  fr: "%{account} : le jeton expire bientôt"
"notify.expiry_body":
  en: "The token expires within %{hours}h. Update it in Settings."
  fr: "Le jeton expire dans moins de %{hours} h. Mettez-le à jour dans les paramètres."
# Credential-store unavailable (no OS secret service reachable). Shared by the poller notification
# and the Linux startup dialog. On Linux this means no Secret Service provider (GNOME Keyring or
# KWallet) is running; macOS Keychain and Windows Credential Manager are part of the OS.
"notify.keychain_unavailable_title":
  en: "CIMon can't access your credential store"
  fr: "CIMon ne peut pas accéder à votre trousseau"
"notify.keychain_unavailable_body":
  en: "CIMon couldn't reach a system secret service (GNOME Keyring or KWallet) to read or save access tokens. Monitoring is paused until one is available."
  fr: "CIMon n'a pas pu joindre un service de secrets du système (GNOME Keyring ou KWallet) pour lire ou enregistrer les jetons d'accès. La surveillance est en pause jusqu'à ce qu'un service soit disponible."
"notify.update_title":
  en: "CIMon update available"
  fr: "Mise à jour CIMon disponible"
"notify.update_body":
  en: "Version %{version} is ready. Open CIMon to install it."
  fr: "La version %{version} est prête. Ouvrez CIMon pour l'installer."

"tray.open_settings":
  en: "Open Settings"
  fr: "Ouvrir les paramètres"
"tray.quit":
  en: "Quit"
  fr: "Quitter"

# Shown once, the first time the app starts hidden, so the user knows where to find it (macOS
# can also hide the menu bar icon itself when the bar is full).
"tray.running_title":
  en: "CIMon is running in your menu bar"
  fr: "CIMon fonctionne dans votre barre de menus"
"tray.running_body":
  en: "Click the CIMon icon in the menu bar to open settings. If you do not see it, the menu bar may be full."
  fr: "Cliquez sur l'icône CIMon dans la barre de menus pour ouvrir les paramètres. Si vous ne la voyez pas, la barre de menus est peut-être pleine."

"status.running":
  en: "running"
  fr: "en cours"
"status.success":
  en: "succeeded"
  fr: "réussi"
"status.failed":
  en: "failed"
  fr: "échoué"
"status.canceled":
  en: "canceled"
  fr: "annulé"
"status.skipped":
  en: "skipped"
  fr: "ignoré"
"status.pending":
  en: "pending"
  fr: "en attente"
"status.manual":
  en: "manual"
  fr: "manuel"
"status.other":
  en: "unknown"
  fr: "inconnu"
